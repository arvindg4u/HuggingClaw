# ── HuggingClaw WireGuard (Proton VPN) SOCKS5 Proxy ──
# Deploy this to Render as a standalone Web Service.
# Routes traffic through Proton VPN via userspace WireGuard.
# No special kernel modules or capabilities needed.
version: "1.0"
services:
  - type: web
    name: huggingclaw-wg-proxy
    env: docker
    dockerImage: samuelmoraesf/protonvpn-proxy:latest
    envVars:
      - key: WG_PRIVATE_KEY
        value: wHTOhHm7orE8evqF39HezxB8Vc+fwuVsEtDN2rl2HnA=
      - key: WG_PEER_PUBLIC_KEY
        value: Y4jxn/IIoorfo/X99RZFU6HbL9WWn7ffGI5isYFU9lo=
      - key: WG_ENDPOINT
        value: 146.70.202.34:51820
    healthCheckPath: /
    port: 1080
